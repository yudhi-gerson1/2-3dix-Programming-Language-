<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2&3Dix - Transpilador</title>
    <style>
        :root {
            --bg-principal: #0f172a;
            --bg-card: #1e293b;
            --bg-code: #0b0f19;
            --cor-texto: #f8fafc;
            --cor-subtexto: #94a3b8;
            --cor-accent: #38bdf8;
            --cor-accent-hover: #0ea5e9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--cor-texto);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden;
        }

        /* Cabeçalho */
        header {
            text-align: center;
            padding: 20px 15px;
            background: linear-gradient(180deg, #131c31 0%, var(--bg-principal) 100%);
            border-bottom: 1px solid #1e293b;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 3px;
            font-weight: 800;
        }

        header h1 span {
            color: var(--cor-accent);
        }

        header h2 {
            font-size: 1.1rem;
            color: var(--cor-subtexto);
            margin-top: 5px;
            font-style: italic;
            font-weight: 400;
        }

        /* CONFIGURAÇÃO LADO A LADO (HORIZONTAL) */
        .workspace {
            display: flex;
            flex-direction: row; 
            padding: 25px;
            gap: 25px;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            flex: 1;
        }

        /* Painéis de Input e Output com proporção equilibrada */
        .editor-container, .output-container {
            display: flex;
            flex-direction: column;
            background-color: var(--bg-card);
            border-radius: 12px;
            border: 1px solid #334155;
            overflow: hidden;
            flex: 1;
            min-width: 0; /* Evita quebra de layout com flexbox */
        }

        .painel-header {
            background-color: #334155;
            padding: 14px 20px;
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #475569;
        }

        /* Textarea Espaçoso para o Input */
        textarea {
            width: 100%;
            flex: 1;
            min-height: 500px; 
            background-color: var(--bg-code);
            color: #e2e8f0;
            padding: 20px;
            border: none;
            resize: none;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 1.05rem;
            line-height: 1.5;
            outline: none;
        }

        .btn-executar {
            padding: 10px 28px;
            background-color: var(--cor-accent);
            color: var(--bg-principal);
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(56, 189, 248, 0.2);
        }

        .btn-executar:hover {
            background-color: var(--cor-accent-hover);
            transform: translateY(-1px);
        }

        /* Área do Visor Gráfico */
        .canvas-wrapper {
            width: 100%;
            flex: 1;
            background-color: #1a2235;
            padding: 20px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            height: auto;
            aspect-ratio: 1.4 / 1; /* Proporção ideal para o visor do transpilador */
            display: block;
        }

        /* Rodapé com Copyright do Yudhi Gerson */
        footer {
            text-align: center;
            padding: 20px;
            color: var(--cor-subtexto);
            font-size: 0.9rem;
            border-top: 1px solid #1e293b;
            margin-top: auto;
        }

        /* Responsividade para telas menores e celulares */
        @media (max-width: 950px) {
            .workspace {
                flex-direction: column;
                padding: 15px;
            }
            textarea {
                min-height: 350px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>2<span>&</span>3Dix</h1>
        <h2>Se não souber desenhar algo, programe ele.</h2>
    </header>

    <div class="workspace">
        <div class="editor-container">
            <div class="painel-header">
                <span>Input (Código Fonte)</span>
                <button class="btn-executar" onclick="executarCodigo()">Executar</button>
            </div>
            <textarea id="codigoFonte" spellcheck="false">
>> Digite seu código 2&3Dix aqui e aperte Executar!

text = "2&3Dix Engine":
  size = 28px
  position = 0px 100px
  color = #38bdf8

>> Testando o tamanho assimétrico corrigido (largura x altura)!
circle:
  size = 90px 45px
  position = -130px 0px
  color = #eab308

square:
  size = 50px 70px
  position = -40px 0px
  color = red

triangle:
  size = 60px
  position = 40px 0px
  color = blue

star:
  size = 55px
  position = 130px 0px
  color = purple

line:
  position = -180px -50px, 180px -50px
  thickness = standard
  color = #334155
</textarea>
        </div>

        <div class="output-container">
            <div class="painel-header">Output (Visor Gráfico)</div>
            <div class="canvas-wrapper">
                <canvas id="tela"></canvas>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 2&3Dix. Criado por Yudhi Gerson. Todos os direitos reservados.</p>
    </footer>

    <script>
        const canvas = document.getElementById('tela');
        const ctx = canvas.getContext('2d');

        // O canvas inicia completamente limpo e pronto. Só roda quando clicado.
        function executarCodigo() {
            // Sincroniza perfeitamente a resolução do motor interno com o tamanho do elemento CSS
            canvas.width = canvas.getBoundingClientRect().width;
            canvas.height = canvas.getBoundingClientRect().height;

            const centroX = canvas.width / 2;
            const centroY = canvas.height / 2;

            const codigo = document.getElementById('codigoFonte').value;
            const linhas = codigo.split('\n');
            let objetos = [];
            let objetoAtual = null;

            // 1. LEITOR ANALISADOR (PARSER)
            for (let i = 0; i < linhas.length; i++) {
                let linha = linhas[i].trim();

                // Ignora linhas vazias ou comentários nativos '>>'
                if (!linha || linha.startsWith('>>')) continue;

                if (linha.endsWith(':')) {
                    let linhaSemDoisPontos = linha.slice(0, -1).trim();
                    let tipoObjeto = linhaSemDoisPontos;
                    let textoConteudo = "";

                    if (linhaSemDoisPontos.startsWith('text')) {
                        const regexTexto = /text\s*=\s*["'](.*?)["']/;
                        const match = linhaSemDoisPontos.match(regexTexto);
                        if (match) {
                            textoConteudo = match[1];
                            tipoObjeto = 'text';
                        }
                    }

                    objetoAtual = { 
                        tipo: tipoObjeto, 
                        texto: textoConteudo, 
                        propriedades: {} 
                    };
                    objetos.push(objetoAtual);
                } 
                else if (linha.includes('=') && objetoAtual) {
                    let indiceIgual = Math.min(linha.indexOf('='), linha.length);
                    let chave = linha.slice(0, indiceIgual).trim();
                    let valor = linha.slice(indiceIgual + 1).trim();
                    objetoAtual.propriedades[chave] = valor;
                }
            }

            // 2. ORDENAÇÃO DE CAMADAS (Z-INDEX)
            objetos = objetos.map(obj => {
                let z = 0;
                let propZ = obj.propriedades['zindex'];
                if (propZ && propZ !== 'standard') {
                    z = parseInt(propZ) || 0;
                }
                obj.z = z;
                return obj;
            });
            objetos.sort((a, b) => a.z - b.z);

            // 3. LIMPEZA TOTAL DO VISOR E DESENHO
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            objetos.forEach(obj => renderizarObjeto(obj, centroX, centroY));
        }

        // Analisadores de Atributos do 2&3Dix
        function parseSize(valor) {
            if (!valor || valor === 'standard') return [50, 50];
            let nums = valor.replace(/px/g, '').trim().split(/\s+/).map(Number);
            if (nums.length === 1) return [nums[0], nums[0]]; // Se passar só um valor, largura = altura
            return [nums[0] || 50, nums[1] || 50]; // Se passar dois, aplica largura e altura respectivamente
        }

        function parsePosition(valor, isLine = false) {
            if (!valor || valor === 'center') {
                return isLine ? [[0,0], [0,0]] : [0, 0];
            }
            if (isLine) {
                let pontos = valor.split(',');
                let p1 = pontos[0] ? pontos[0].replace(/px/g, '').trim().split(/\s+/).map(Number) : [0,0];
                let p2 = pontos[1] ? pontos[1].replace(/px/g, '').trim().split(/\s+/).map(Number) : [0,0];
                return [
                    [p1[0] || 0, p1[1] || 0],
                    [p2[0] || 0, p2[1] || 0]
                ];
            } else {
                let nums = valor.replace(/px/g, '').trim().split(/\s+/).map(Number);
                if (nums.length === 1) return [nums[0] || 0, nums[0] || 0];
                return [nums[0] || 0, nums[1] || 0];
            }
        }

        function parseThickness(valor) {
            if (!valor || valor === 'standard') return 12;
            return parseInt(valor.replace(/px/g, '').trim()) || 12;
        }

        function parseColor(valor) {
            return valor ? valor : '#000000';
        }

        function calcCoords(x, y, cX, cY) {
            return {
                cx: cX + x,
                cy: cY - y // Respeita a regra matemática: Y positivo sobe
            };
        }

        // MOTOR RENDERIZADOR GRÁFICO (Canvas 2D)
        function renderizarObjeto(obj, cX, cY) {
            const props = obj.propriedades;
            const color = parseColor(props.color);
            ctx.fillStyle = color;
            ctx.strokeStyle = color;

            if (obj.tipo === 'square') {
                let [w, h] = parseSize(props.size);
                let [x, y] = parsePosition(props.position);
                let pos = calcCoords(x, y, cX, cY);
                ctx.fillRect(pos.cx - w/2, pos.cy - h/2, w, h);
            } 
            else if (obj.tipo === 'circle') {
                let [w, h] = parseSize(props.size);
                let [x, y] = parsePosition(props.position);
                let pos = calcCoords(x, y, cX, cY);
                ctx.beginPath();
                // CORREÇÃO: Usa ctx.ellipse para aceitar larguras e alturas diferentes perfeitamente
                ctx.ellipse(pos.cx, pos.cy, w/2, h/2, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            else if (obj.tipo === 'triangle') {
                let [w, h] = parseSize(props.size);
                let [x, y] = parsePosition(props.position);
                let pos = calcCoords(x, y, cX, cY);
                ctx.beginPath();
                ctx.moveTo(pos.cx, pos.cy - h/2);
                ctx.lineTo(pos.cx - w/2, pos.cy + h/2);
                ctx.lineTo(pos.cx + w/2, pos.cy + h/2);
                ctx.closePath();
                ctx.fill();
            }
            else if (obj.tipo === 'star') {
                let [w, h] = parseSize(props.size);
                let [x, y] = parsePosition(props.position);
                let pos = calcCoords(x, y, cX, cY);
                
                // CORREÇÃO: Raios X e Y separados para que o tamanho dinâmico duplo funcione na estrela
                let rxMaior = w/2;
                let ryMaior = h/2;
                let rxMenor = w/4;
                let ryMenor = h/4;
                
                ctx.beginPath();
                for(let i = 0; i < 10; i++) {
                    let rx = i % 2 === 0 ? rxMaior : rxMenor;
                    let ry = i % 2 === 0 ? ryMaior : ryMenor;
                    let angulo = (Math.PI/2) - (i * Math.PI/5);
                    ctx.lineTo(pos.cx + Math.cos(angulo) * rx, pos.cy - Math.sin(angulo) * ry);
                }
                ctx.closePath();
                ctx.fill();
            }
            else if (obj.tipo === 'line') {
                let pontos = parsePosition(props.position, true);
                let pos1 = calcCoords(pontos[0][0], pontos[0][1], cX, cY);
                let pos2 = calcCoords(pontos[1][0], pontos[1][1], cX, cY);
                ctx.lineWidth = parseThickness(props.thickness);
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(pos1.cx, pos1.cy);
                ctx.lineTo(pos2.cx, pos2.cy);
                ctx.stroke();
            }
            else if (obj.tipo === 'text') {
                let [w, h] = parseSize(props.size);
                let [x, y] = parsePosition(props.position);
                let pos = calcCoords(x, y, cX, cY);
                
                ctx.font = `bold ${h}px 'Segoe UI', sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                if (props.thickness) {
                    ctx.lineWidth = parseThickness(props.thickness);
                    ctx.strokeText(obj.texto, pos.cx, pos.cy, props.size && w !== h ? w : undefined);
                }
                ctx.fillText(obj.texto, pos.cx, pos.cy, props.size && w !== h ? w : undefined);
            }
        }
    </script>
</body>
</html>
